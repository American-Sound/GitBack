name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:

  build-windows-installer:
    name: Windows Installer (64-bit)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: echo "VERSION=$('${{ github.ref_name }}' -replace '^v','')" >> $env:GITHUB_OUTPUT

      - name: Build with PowerShell
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: ./install/build.ps1

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            /DSourceDir="${{ github.workspace }}\dist\" `
            install/gitback.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: install\Output\*.exe


  build-windows-binary:
    name: Windows Binary (portable)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: echo "VERSION=$('${{ github.ref_name }}' -replace '^v','')" >> $env:GITHUB_OUTPUT

      - name: Build with PowerShell
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: ./install/build.ps1

      - name: Zip portable binary
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath GitBack-windows-x64.zip

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: GitBack-windows-x64.zip


  build-linux-binary:
    name: Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          chmod +x ./install/build.sh
          ./install/build.sh

      - name: Tar binary
        run: tar -czf GitBack-linux-x64.tar.gz -C dist/ .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: GitBack-linux-x64.tar.gz


  release:
    name: Create Release
    needs: [build-windows-installer, build-windows-binary, build-linux-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Write version.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cat > version.json << EOF
          {
            "version": "$VERSION",
            "windows_installer": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/GitBack_Setup_$VERSION.exe",
            "windows_binary": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/GitBack-windows-x64.zip",
            "linux_binary": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/GitBack-linux-x64.tar.gz"
          }
          EOF

      - name: Determine if major release
        id: release_type
        run: |
          VERSION="${{ github.ref_name }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1 | tr -d 'v')
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            PREV_MAJOR=$(echo "$PREV_TAG" | cut -d. -f1 | tr -d 'v')
            if [ "$MAJOR" -gt "$PREV_MAJOR" ]; then
              echo "IS_MAJOR=true" >> $GITHUB_OUTPUT
            else
              echo "IS_MAJOR=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "IS_MAJOR=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG".."${{ github.ref_name }}" --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "$LOG" > changelog.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}${{ steps.release_type.outputs.IS_MAJOR == 'true' && ' (Major Release)' || '' }}
          body_path: changelog.txt
          prerelease: false
          files: |
            artifacts/windows-installer/GitBack_Setup_*.exe
            artifacts/windows-binary/GitBack-windows-x64.zip
            artifacts/linux-binary/GitBack-linux-x64.tar.gz
            version.json